<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vague de Particules</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; background: #F2F3FF; height: 100vh; overflow: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #panel { display: none; }

        /* ── Panel ── */
        #panel {
            position: fixed;
            top: 20px; right: 20px;
            width: 280px;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(180,190,255,0.45);
            border-radius: 14px;
            font-family: 'Helvetica Neue', Helvetica, sans-serif;
            font-size: 12px;
            color: #222;
            box-shadow: 0 8px 32px rgba(80,100,200,0.12);
            z-index: 10;
            user-select: none;
        }
        #panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px 10px;
            border-bottom: 1px solid rgba(180,190,255,0.3);
            cursor: pointer;
        }
        #panel-header span { font-weight: 600; font-size: 13px; letter-spacing: 0.01em; color: #1a3acc; }
        #panel-toggle { font-size: 16px; color: #888; line-height: 1; }
        #panel-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 10px; }
        #panel-body.collapsed { display: none; }

        .section-title {
            font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #8899dd;
            margin-top: 4px; margin-bottom: 2px;
        }
        .row { display: flex; align-items: center; gap: 8px; }
        .row label { flex: 0 0 110px; color: #444; }
        .row input[type=range] {
            flex: 1; height: 3px; accent-color: #2255dd;
            cursor: pointer;
        }
        .val { flex: 0 0 36px; text-align: right; color: #2255dd; font-variant-numeric: tabular-nums; }
        .row input[type=color] {
            flex: 0 0 32px; height: 24px; border: none; border-radius: 6px;
            cursor: pointer; padding: 0; background: none;
        }
        .row .color-label { flex: 1; }
        button#rebuild-btn {
            width: 100%; padding: 7px; border: none; border-radius: 8px;
            background: #2255dd; color: #fff; font-size: 12px; font-weight: 600;
            cursor: pointer; margin-top: 4px; letter-spacing: 0.02em;
            transition: background 0.15s;
        }
        button#rebuild-btn:hover { background: #1a44cc; }
        .hint { font-size: 10px; color: #aab; margin-top: -4px; }
    </style>
</head>
<body>

<!-- Controls Panel -->
<div id="panel">
    <div id="panel-header">
        <span>Contrôles</span>
        <div style="display:flex;gap:6px;align-items:center">
            <button id="copy-btn" title="Copier les valeurs (JSON)" style="font-size:11px;padding:3px 8px;border:1px solid rgba(34,85,221,0.4);border-radius:6px;background:rgba(34,85,221,0.08);color:#2255dd;cursor:pointer;">📋 Copier</button>
            <button id="save-btn" title="Sauvegarder les valeurs" style="font-size:11px;padding:3px 8px;border:1px solid rgba(34,85,221,0.4);border-radius:6px;background:rgba(34,85,221,0.08);color:#2255dd;cursor:pointer;">💾 Sauver</button>
            <span id="panel-toggle">▾</span>
        </div>
    </div>
    <div id="panel-body">

        <div class="section-title">Quadrillage</div>
        <div class="row">
            <label>Espacement</label>
            <input type="range" id="spacing" min="0.3" max="3.0" step="0.05" value="0.45">
            <span class="val" id="spacing-val">0.45</span>
        </div>

        <div class="section-title">Particules</div>
        <div class="row">
            <label>Densité (cols)</label>
            <input type="range" id="cols" min="50" max="400" step="10" value="400">
            <span class="val" id="cols-val">400</span>
        </div>
        <div class="row">
            <label>Densité (rows)</label>
            <input type="range" id="rows" min="50" max="300" step="10" value="90">
            <span class="val" id="rows-val">90</span>
        </div>
        <div class="hint">↑ Modifier la densité demande de reconstruire</div>
        <button id="rebuild-btn">Reconstruire les particules</button>

        <div class="row" style="margin-top:4px">
            <label>Taille min (px)</label>
            <input type="range" id="sizeMin" min="0.5" max="6" step="0.5" value="6">
            <span class="val" id="sizeMin-val">6</span>
        </div>
        <div class="row">
            <label>Taille max (px)</label>
            <input type="range" id="sizeMax" min="1" max="12" step="0.5" value="3">
            <span class="val" id="sizeMax-val">3</span>
        </div>
        <div class="row">
            <label>Base scale</label>
            <input type="range" id="ptBase" min="100" max="1200" step="50" value="150">
            <span class="val" id="ptBase-val">150</span>
        </div>

        <div class="section-title">Couleurs</div>
        <div class="row">
            <span class="color-label">Couleur principale</span>
            <input type="color" id="colorA" value="#1a55cc">
        </div>
        <div class="row">
            <span class="color-label">Couleur secondaire</span>
            <input type="color" id="colorB" value="#89b4f5">
        </div>
        <div class="row">
            <span class="color-label">Fond</span>
            <input type="color" id="bgColor" value="#F2F3FF">
        </div>

        <div class="section-title">Position &amp; Orientation du plan</div>
        <div class="row">
            <label>Position Y</label>
            <input type="range" id="planY" min="-20" max="20" step="0.5" value="0">
            <span class="val" id="planY-val">0</span>
        </div>
        <div class="row">
            <label>Position Z</label>
            <input type="range" id="planZ" min="-40" max="40" step="1" value="3">
            <span class="val" id="planZ-val">3</span>
        </div>
        <div class="row">
            <label>Inclinaison X (°)</label>
            <input type="range" id="tiltX" min="-60" max="60" step="1" value="1">
            <span class="val" id="tiltX-val">1</span>
        </div>
        <div class="row">
            <label>Rotation Y (°)</label>
            <input type="range" id="tiltY" min="-60" max="60" step="1" value="-4">
            <span class="val" id="tiltY-val">-4</span>
        </div>
        <div class="row">
            <label>Hauteur caméra</label>
            <input type="range" id="camH" min="5" max="60" step="1" value="8">
            <span class="val" id="camH-val">8</span>
        </div>

        <div class="section-title">Vagues</div>
        <div class="row">
            <label>Amplitude</label>
            <input type="range" id="amp" min="0.1" max="3.0" step="0.05" value="0.35">
            <span class="val" id="amp-val">0.35</span>
        </div>
        <div class="row">
            <label>Vitesse</label>
            <input type="range" id="speed" min="0.02" max="1.0" step="0.02" value="0.22">
            <span class="val" id="speed-val">0.22</span>
        </div>
        <div class="row">
            <label>Fréquence</label>
            <input type="range" id="freq" min="0.5" max="3.0" step="0.1" value="1.0">
            <span class="val" id="freq-val">1.0</span>
        </div>
        <div class="row">
            <label>Turbulence</label>
            <input type="range" id="turb" min="1" max="7" step="1" value="7">
            <span class="val" id="turb-val">7</span>
        </div>

        <div class="section-title">Hover</div>
        <div class="row">
            <label>Intensité</label>
            <input type="range" id="hoverStrength" min="0" max="8" step="0.1" value="0.2">
            <span class="val" id="hoverStrength-val">0.2</span>
        </div>
        <div class="row">
            <label>Rayon</label>
            <input type="range" id="hoverRadius" min="0.05" max="0.5" step="0.01" value="0.22">
            <span class="val" id="hoverRadius-val">0.22</span>
        </div>

        <div class="section-title">Profondeur de champ</div>
        <div class="row">
            <label>Intensité (aperture)</label>
            <input type="range" id="aperture" min="0" max="0.25" step="0.005" value="0.04">
            <span class="val" id="aperture-val">0.04</span>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // ── Live params (bound to controls) ──
    const P = {
        cols: 400, rows: 90,
        spacingX: 0.6, spacingZ: 0.6,
        spacing: 0.45,
        ptBase: 150, sizeMin: 6, sizeMax: 3,
        colorA: '#1a55cc', colorB: '#89b4f5', bgColor: '#F2F3FF',
        planY: 0, planZ: 3, tiltX: 1, tiltY: -4, camH: 8,
        amp: 0.35, speed: 0.22, freq: 1.0, turb: 7,
        aperture: 0.04,
        hoverStrength: 0.2, hoverRadius: 0.22,
    };

    let scene, camera, renderer, pointsMesh, interactionPlane;
    const clock = new THREE.Clock();
    const mouseNDC = new THREE.Vector2(-10, -10);
    const smoothMouseNDC = new THREE.Vector2(-10, -10);
    const smoothMouse3D = new THREE.Vector3(0, 0, 0);
    const raycaster = new THREE.Raycaster();

    init();
    bindControls();
    loadSaved();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(P.bgColor);

        const aspect = window.innerWidth / window.innerHeight;
        camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 500);
        camera.position.set(0, P.camH, 40);
        camera.lookAt(0, 0, -15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        interactionPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(400, 400),
            new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
        );
        interactionPlane.rotation.x = -Math.PI / 2;
        scene.add(interactionPlane);

        window._dbg = { mouseNDC, smoothMouseNDC, getU: () => pointsMesh?.material.uniforms };
        buildGrid();

        const onMove = e => {
            mouseNDC.x =  (e.clientX / window.innerWidth)  * 2 - 1;
            mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
        };
        window.addEventListener('mousemove',   onMove);
        window.addEventListener('pointermove', onMove);
        document.addEventListener('mousemove', onMove);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    }

    function buildGrid() {
        if (pointsMesh) { scene.remove(pointsMesh); pointsMesh.geometry.dispose(); pointsMesh.material.dispose(); }

        const N = P.cols * P.rows;
        const pos  = new Float32Array(N * 3);
        const seed = new Float32Array(N);
        const totalW = P.cols * P.spacingX;
        const totalD = P.rows * P.spacingZ;

        let idx = 0;
        for (let ci = 0; ci < P.cols; ci++) {
            for (let ri = 0; ri < P.rows; ri++) {
                pos[idx * 3]     = (ci / (P.cols - 1) - 0.5) * totalW;
                pos[idx * 3 + 1] = 0.0;
                // start near camera, extend into depth (not symmetric)
                pos[idx * 3 + 2] = 18 - (ri / (P.rows - 1)) * totalD;
                seed[idx] = Math.random();
                idx++;
            }
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos,  3));
        geo.setAttribute('aSeed',    new THREE.BufferAttribute(seed, 1));

        const mat = new THREE.ShaderMaterial({
            uniforms: {
                uTime:          { value: 0.0 },
                uPtBase:        { value: P.ptBase },
                uSizeMin:       { value: P.sizeMin },
                uSizeMax:       { value: P.sizeMax },
                uColorA:        { value: new THREE.Color(P.colorA) },
                uColorB:        { value: new THREE.Color(P.colorB) },
                uAmp:           { value: P.amp },
                uFreq:          { value: P.freq },
                uTurb:          { value: P.turb },
                uMouseNDC:      { value: new THREE.Vector2(-10, -10) },
                uSpacing:       { value: 1.0 },
                uAspect:        { value: window.innerWidth / window.innerHeight },
                uHoverColor:    { value: new THREE.Color('#12EBC7') },
                uHoverStrength: { value: 3.0 },
                uHoverRadius:   { value: 0.30 },
                uFocalDepth:    { value: 45.0 },
                uAperture:      { value: P.aperture },
            },
            vertexShader: /* glsl */`
                attribute float aSeed;
                uniform float uTime, uPtBase, uSizeMin, uSizeMax;
                uniform float uAmp, uFreq, uTurb, uSpacing;
                uniform float uFocalDepth, uAperture;
                uniform float uHoverStrength, uHoverRadius, uAspect;
                uniform vec2  uMouseNDC;
                uniform vec3  uColorA, uColorB, uHoverColor;
                varying float vAlpha;
                varying vec3  vColor;
                varying float vCoC;

                // wave stack — up to 7 harmonics
                float waves(vec2 xz, float t) {
                    float h = 0.0;
                    h += sin(xz.x * 0.18 * uFreq + xz.y * 0.12 * uFreq + t * 1.0)  * 5.5;
                    if (uTurb >= 2.0) h += sin(xz.x * 0.09 * uFreq - xz.y * 0.22 * uFreq + t * 0.65) * 4.2;
                    if (uTurb >= 3.0) h += sin(xz.x * 0.32 * uFreq + xz.y * 0.07 * uFreq - t * 0.85) * 2.8;
                    if (uTurb >= 4.0) h += sin(xz.x * 0.06 * uFreq + xz.y * 0.31 * uFreq + t * 0.45) * 6.5;
                    if (uTurb >= 5.0) h += sin(xz.x * 0.24 * uFreq - xz.y * 0.16 * uFreq + t * 1.3)  * 1.8;
                    if (uTurb >= 6.0) h += sin(xz.x * 0.41 * uFreq + xz.y * 0.28 * uFreq - t * 0.55) * 3.2;
                    if (uTurb >= 7.0) h += sin(xz.x * 0.13 * uFreq - xz.y * 0.38 * uFreq + t * 0.9)  * 2.0;
                    return h * uAmp;
                }

                void main() {
                    vec3 p = position;
                    p.x *= uSpacing;
                    p.z *= uSpacing;
                    p.y = waves(p.xz, uTime);

                    // micro jitter
                    p.x += sin(uTime * 0.7 + aSeed * 29.3) * 0.04;
                    p.z += cos(uTime * 0.6 + aSeed * 13.7) * 0.04;

                    // screen-space hover: bump up + color shift near cursor
                    vec4 preClip = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
                    vec2 ndc = preClip.xy / preClip.w;
                    vec2 delta = uMouseNDC - ndc;
                    delta.x *= uAspect;
                    float screenDist = length(delta);
                    float hover = 1.0 - smoothstep(0.0, uHoverRadius, screenDist);
                    p.y += hover * uHoverStrength * 6.0;

                    vec4 mvPos = modelViewMatrix * vec4(p, 1.0);
                    float depth = -mvPos.z;

                    // DOF — circle of confusion
                    float coc = clamp(abs(depth - uFocalDepth) * uAperture, 0.0, 1.0);
                    vCoC = coc;

                    float sz = uPtBase * (0.6 + aSeed * 0.4) / max(depth, 1.0);
                    sz = sz * (1.0 + coc * 4.0);
                    gl_PointSize = clamp(sz, uSizeMin, uSizeMax * (1.0 + coc * 3.0));
                    gl_Position  = projectionMatrix * mvPos;

                    float h01 = clamp(p.y / 4.0 * 0.5 + 0.5, 0.0, 1.0);
                    vec3 baseColor = mix(uColorA, uColorB, h01);
                    vColor = baseColor;
                    // hover: shift toward bright cyan-white
                    vColor = mix(vColor, uHoverColor + 0.3, hover * 0.85);
                    vAlpha = (0.6 + aSeed * 0.38) * (1.0 - coc * 0.72) + hover * 0.35;
                }
            `,
            fragmentShader: /* glsl */`
                varying float vAlpha;
                varying vec3  vColor;
                varying float vCoC;
                void main() {
                    float d = length(gl_PointCoord - vec2(0.5));
                    if (d > 0.5) discard;
                    float sharpness = mix(2.8, 0.9, vCoC);
                    float soft = pow(1.0 - d * 2.0, sharpness);
                    gl_FragColor = vec4(vColor, vAlpha * soft);
                }
            `,
            transparent: true,
            blending: THREE.NormalBlending,
            depthWrite: false,
        });

        pointsMesh = new THREE.Points(geo, mat);
        scene.add(pointsMesh);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime() * P.speed;
        if (pointsMesh) {
            const u = pointsMesh.material.uniforms;
            u.uTime.value          = t;
            u.uPtBase.value        = P.ptBase;
            u.uSizeMin.value       = P.sizeMin;
            u.uSizeMax.value       = P.sizeMax;
            u.uColorA.value.set(P.colorA);
            u.uColorB.value.set(P.colorB);
            u.uAmp.value           = P.amp;
            u.uFreq.value          = P.freq;
            u.uTurb.value          = P.turb;
            u.uSpacing.value       = P.spacing;
            u.uHoverStrength.value = P.hoverStrength;
            u.uHoverRadius.value   = P.hoverRadius;

            smoothMouseNDC.lerp(mouseNDC, 0.10);
            u.uMouseNDC.value.copy(smoothMouseNDC);
            u.uAspect.value        = window.innerWidth / window.innerHeight;

            const meshCenter = new THREE.Vector3(0, P.planY, -10);
            const centerMV = meshCenter.clone().applyMatrix4(camera.matrixWorldInverse);
            u.uFocalDepth.value = -centerMV.z;
            u.uAperture.value   = P.aperture;

            pointsMesh.rotation.x = THREE.MathUtils.degToRad(P.tiltX);
            pointsMesh.rotation.y = THREE.MathUtils.degToRad(P.tiltY);
            pointsMesh.position.y = P.planY;
            pointsMesh.position.z = P.planZ;
        }

        camera.position.y = P.camH;
        camera.lookAt(0, 0, -15);

        scene.background.set(P.bgColor);

        renderer.render(scene, camera);
    }

    // ── Controls binding ──
    function bindControls() {
        function bind(id, key, parse, decimals = 0) {
            const el  = document.getElementById(id);
            const val = document.getElementById(id + '-val');
            el.addEventListener('input', () => {
                P[key] = parse(el.value);
                if (val) val.textContent = decimals > 0 ? parseFloat(el.value).toFixed(decimals) : el.value;
            });
        }
        bind('spacing', 'spacing', parseFloat, 2);
        bind('cols',     'cols',          Number);
        bind('rows',     'rows',          Number);
        bind('sizeMin',  'sizeMin',       parseFloat, 1);
        bind('sizeMax',  'sizeMax',       parseFloat, 1);
        bind('ptBase',   'ptBase',        Number);
        bind('planY',    'planY',  parseFloat, 1);
        bind('planZ',    'planZ',  parseFloat, 1);
        bind('tiltX',    'tiltX',         Number);
        bind('tiltY',    'tiltY',         Number);
        bind('camH',     'camH',          Number);
        bind('amp',      'amp',           parseFloat, 2);
        bind('speed',    'speed',         parseFloat, 2);
        bind('freq',     'freq',          parseFloat, 1);
        bind('turb',     'turb',          Number);
        bind('hoverStrength', 'hoverStrength', parseFloat, 1);
        bind('hoverRadius',   'hoverRadius',   parseFloat, 2);
        bind('aperture', 'aperture', parseFloat, 3);

        ['colorA', 'colorB', 'bgColor'].forEach(id => {
            document.getElementById(id).addEventListener('input', e => { P[id] = e.target.value; });
        });

        document.getElementById('rebuild-btn').addEventListener('click', buildGrid);

        document.getElementById('panel-header').addEventListener('click', e => {
            if (e.target.id === 'save-btn' || e.target.id === 'copy-btn') return;
            const body   = document.getElementById('panel-body');
            const toggle = document.getElementById('panel-toggle');
            const open   = !body.classList.contains('collapsed');
            body.classList.toggle('collapsed', open);
            toggle.textContent = open ? '▸' : '▾';
        });

        document.getElementById('save-btn').addEventListener('click', e => {
            e.stopPropagation();
            localStorage.setItem('vague-config', JSON.stringify(P));
            const btn = e.target;
            btn.textContent = '✓ Sauvé';
            setTimeout(() => { btn.textContent = '💾 Sauver'; }, 1500);
        });

        document.getElementById('copy-btn').addEventListener('click', async e => {
            e.stopPropagation();
            const btn = e.target;
            const json = JSON.stringify(P, null, 2);
            try {
                await navigator.clipboard.writeText(json);
                btn.textContent = '✓ Copié';
            } catch (err) {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = json;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); btn.textContent = '✓ Copié'; }
                catch { btn.textContent = '✗ Erreur'; console.log(json); }
                document.body.removeChild(ta);
            }
            setTimeout(() => { btn.textContent = '📋 Copier'; }, 1500);
        });
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            const panel = document.getElementById('panel');
            const hidden = getComputedStyle(panel).display === 'none';
            panel.style.display = hidden ? 'block' : 'none';
        }
    });

    function loadSaved() {
        const saved = localStorage.getItem('vague-config');
        if (!saved) return;
        try {
            const cfg = JSON.parse(saved);
            // ignore old cyan-related keys
            delete cfg.cyanSpeed;
            delete cfg.cyanWidth;
            Object.assign(P, cfg);
            Object.keys(cfg).forEach(key => {
                const el  = document.getElementById(key);
                const val = document.getElementById(key + '-val');
                if (el) { el.value = cfg[key]; }
                if (val) { val.textContent = cfg[key]; }
                const colorEl = document.getElementById(key === 'colorA' ? 'colorA' : key === 'colorB' ? 'colorB' : key === 'bgColor' ? 'bgColor' : null);
                if (colorEl && colorEl.type === 'color') colorEl.value = cfg[key];
            });
        } catch(e) { console.warn('Config invalide', e); }
        buildGrid();
    }
</script>

</body>
</html>
